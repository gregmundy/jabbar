accounts:
  - name: gmail
    provider: gmail
    email: you@gmail.com
    auth: app_password
    password: "xxxx xxxx xxxx xxxx"
    imap_host: imap.gmail.com
    imap_port: 993
    mailbox: '"[Gmail]/All Mail"'
    tag: Personal              # optional — groups data sources

  - name: yahoo
    provider: yahoo
    email: you@yahoo.com
    auth: app_password
    password: "xxxxxxxxxxxxxxxx"
    imap_host: imap.mail.yahoo.com
    imap_port: 993
    mailbox: INBOX
    tag: Personal

  - name: hotmail
    provider: hotmail
    email: you@hotmail.com
    auth: oauth2
    client_id: "your-entra-app-client-id"
    redirect_uri: "http://localhost:8400/callback"
    token_file: ".hotmail_tokens.json"
    imap_host: outlook.office365.com
    imap_port: 993
    mailbox: INBOX
    tag: Work

scan:
  months_back: 24
  keywords:
    # Core transaction signals
    - receipt
    - payment
    - invoice
    - order
    - charge
    - billing
    - subscription
    - renewal
    - purchase
    - transaction
    - statement
    - autopay
    - trial
    - refund
    # Broader financial signals
    - bill
    - confirmation
    - balance
    - reminder
    - credit
    - deposit
    - shipped
    - membership
    - overdue
    # Insurance, loans, investments
    - coverage
    - payoff
    - policy
    - expiring
    - loan
    - insurance
    - transfer
    - cashback
    - tax
    - claim
    - dividend
    # Urgency signals
    - action required

extraction:
  llm_endpoint: "http://localhost:1234/v1/chat/completions"
  llm_model: "qwen2.5-14b-instruct-mlx"
  temperature: 0.1
  max_tokens: 500
  max_body_chars: 8000

analysis:
  claude_model: "claude-sonnet-4-20250514"
